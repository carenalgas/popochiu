services:
    documentation:
        ports:
            - 286:80
        volumes:
            - .:/app
            - ..:/project
        working_dir: /app
        labels:
            - com.dnsdock.alias=docs.popochiu.local
        build:
            context: .
            dockerfile: Dockerfile
        command: serve -a 0.0.0.0:80 --livereload